<!DOCTYPE html>
<html>
<head>
    <title>E-Bike Dash</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div id="temp-bar"></div>
    
    <div class="dashboard-container">
        <div class="status-bar">
            <div class="indicator" id="gps-indicator">GPS</div>
            <div class="indicator" id="lte-indicator">LTE</div>
            <div class="indicator" id="smoke-indicator">SAFE</div>
        </div>

        <div class="main-cluster">
            <div class="speed-side">
                <div class="speed-box">
                    <span id="speed-val">0</span>
                    <div class="unit">KM/H</div>
                </div>
            </div>
            <div class="map-side">
                <div id="map"></div>
            </div>
        </div>

        <div class="info-cluster">
            <div class="data-box">
                <label>ODOMETER</label>
                <span id="dist-val">0.00</span> <small>km</small>
            </div>
            <div class="data-box">
                <label>POWER & THERMAL</label>
                <span id="batt-val">0.0</span>V | <span id="temp-val">0</span>°C
            </div>
            <div class="data-box">
                <label>GYRO TILT</label>
                <span id="gyro-val">0</span>°
            </div>
        </div>
    </div>

    <button id="kb-toggle" onclick="toggleKeyboard()">⌨️</button>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
